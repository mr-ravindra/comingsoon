<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050505;
--glass:rgba(255,255,255,.06);
--glass-border:rgba(255,255,255,.12);
--text:#ffffff;
--secondary:#b5b5b5;
--accent:#2997ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter,sans-serif;
background:
radial-gradient(circle at top,#1a1a1a 0%,#090909 45%,#000 100%);
color:var(--text);
overflow:hidden;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

/* Background Blur */

.blur{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.35;
animation:float 12s ease-in-out infinite;
}

.blur.one{
width:420px;
height:420px;
background:#2997ff;
top:-120px;
left:-120px;
}

.blur.two{
width:380px;
height:380px;
background:#7c3aed;
bottom:-120px;
right:-120px;
animation-delay:4s;
}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-40px);
}

}

.card{

position:relative;
z-index:10;

width:100%;
max-width:900px;

padding:70px 60px;

background:var(--glass);

border:1px solid var(--glass-border);

backdrop-filter:blur(25px);

border-radius:32px;

text-align:center;

box-shadow:
0 25px 70px rgba(0,0,0,.45);

animation:fadeUp 1s ease;
}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.logo{

width:82px;
height:82px;
margin:auto;
margin-bottom:30px;

border-radius:24px;

background:linear-gradient(135deg,#2997ff,#5ac8fa);

display:flex;
align-items:center;
justify-content:center;

font-size:38px;

box-shadow:
0 20px 40px rgba(41,151,255,.35);

}

.badge{

display:inline-block;

padding:8px 18px;

border-radius:999px;

background:rgba(255,255,255,.08);

color:#ddd;

font-size:.85rem;

margin-bottom:24px;

letter-spacing:.08em;

text-transform:uppercase;

}

h1{

font-size:clamp(2.8rem,6vw,4.8rem);

font-weight:700;

letter-spacing:-2px;

line-height:1.05;

margin-bottom:22px;

}

.gradient{

background:linear-gradient(90deg,#ffffff,#d6eaff,#2997ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.description{

max-width:650px;

margin:auto;

font-size:1.1rem;

line-height:1.9;

color:var(--secondary);

margin-bottom:50px;

}

.countdown{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:18px;

margin-bottom:50px;

}

.box{

background:rgba(255,255,255,.05);

padding:25px;

border-radius:22px;

border:1px solid rgba(255,255,255,.08);

transition:.35s;

}

.box:hover{

transform:translateY(-5px);

background:rgba(255,255,255,.08);

}

.number{

font-size:2.4rem;

font-weight:700;

margin-bottom:6px;

}

.label{

font-size:.8rem;

text-transform:uppercase;

letter-spacing:.1em;

color:#999;

}

form{

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

margin-bottom:35px;

}

input{

width:320px;

max-width:100%;

padding:16px 20px;

border:none;

outline:none;

border-radius:999px;

background:#fff;

font-size:15px;

}

button{

padding:16px 30px;

border:none;

border-radius:999px;

background:var(--accent);

color:white;

font-weight:600;

cursor:pointer;

transition:.35s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 15px 35px rgba(41,151,255,.45);

}

footer{

color:#8a8a8a;

font-size:.92rem;

}

footer a{

color:#fff;

text-decoration:none;

}

@media(max-width:700px){

.card{

padding:45px 30px;

}

.countdown{

grid-template-columns:repeat(2,1fr);

}

h1{

font-size:2.6rem;

}

}

</style>

</head>

<body>

<div class="blur one"></div>
<div class="blur two"></div>

<div class="card">

<div class="logo"></div>

<div class="badge">
Launching Soon
</div>

<h1>
A New Experience<br>
<span class="gradient">is Almost Here.</span>
</h1>

<p class="description">
We're carefully crafting something beautiful, fast, and effortless.
Every detail is being refined to deliver an exceptional experience.
</p>

<div class="countdown">

<div class="box">
<div id="days" class="number">00</div>
<div class="label">Days</div>
</div>

<div class="box">
<div id="hours" class="number">00</div>
<div class="label">Hours</div>
</div>

<div class="box">
<div id="minutes" class="number">00</div>
<div class="label">Minutes</div>
</div>

<div class="box">
<div id="seconds" class="number">00</div>
<div class="label">Seconds</div>
</div>

</div>

<form>

<input
type="email"
placeholder="Enter your email">

<button>
Notify Me
</button>

</form>

<footer>

© 2026 Your Brand • Crafted with simplicity.

</footer>

</div>

<script>

const launchDate = new Date("September 1, 2026 00:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();

const distance = launchDate - now;

const d = Math.floor(distance/(1000*60*60*24));
const h = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((distance%(1000*60*60))/(1000*60));
const s = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML=d<10?"0"+d:d;
document.getElementById("hours").innerHTML=h<10?"0"+h:h;
document.getElementById("minutes").innerHTML=m<10?"0"+m:m;
document.getElementById("seconds").innerHTML=s<10?"0"+s:s;

},1000);

</script>

</body>
</html>
